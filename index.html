<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Parts Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f1c;
  --surface: #121828;
  --surface2: #1a2236;
  --surface3: #202c42;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #00d4a0;
  --accent2: #3b9eff;
  --text: #eef2ff;
  --text2: #8899bb;
  --text3: #3d5070;
  --success: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --r: 12px;
  --rs: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,160,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,160,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 20px 60px;}

header{padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.logo-t{font-size:16px;font-weight:700;}
.logo-s{font-size:11px;color:var(--text2);margin-top:1px;}
.live{display:flex;align-items:center;gap:6px;background:rgba(0,212,160,.08);border:1px solid rgba(0,212,160,.2);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--accent);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}

/* Steps */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.ph{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pt{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.pico{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;}
.ic-b{background:rgba(59,158,255,.14);color:var(--accent2);}
.ic-g{background:rgba(0,212,160,.14);color:var(--accent);}
.pb{padding:18px;}

/* Step indicators */
.step-row{display:flex;align-items:center;gap:0;margin-bottom:20px;}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.step-item:not(:last-child)::after{content:'';position:absolute;top:14px;left:0;width:100%;height:1px;background:var(--border2);z-index:0;}
.step-item.done::after{background:var(--accent);}
.step-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);position:relative;z-index:1;transition:all .3s;}
.step-item.active .step-circle{border-color:var(--accent2);color:var(--accent2);background:rgba(59,158,255,.1);}
.step-item.done .step-circle{border-color:var(--accent);background:var(--accent);color:#000;font-weight:700;}
.step-lbl{font-size:10px;color:var(--text3);margin-top:5px;text-align:center;}
.step-item.active .step-lbl{color:var(--text2);}
.step-item.done .step-lbl{color:var(--accent);}

/* Car selector */
.car-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.car-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;cursor:pointer;text-align:right;transition:all .15s;font-family:'IBM Plex Sans Arabic',sans-serif;width:100%;}
.car-btn:hover{border-color:var(--accent2);background:rgba(59,158,255,.06);}
.car-btn.sel{border-color:var(--accent);background:rgba(0,212,160,.07);}
.car-m{font-size:13px;font-weight:600;color:var(--text);}
.car-y{font-size:11px;color:var(--text2);margin-top:2px;}
.car-eng{font-size:10px;color:var(--text3);margin-top:1px;}

/* Textarea */
.inp-lbl{font-size:11px;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;}
textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:13px;color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;resize:vertical;outline:none;transition:border-color .2s;direction:rtl;line-height:1.8;min-height:100px;}
textarea:focus{border-color:var(--accent2);}
textarea::placeholder{color:var(--text3);}

/* Run btn */
.run-btn{width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,var(--accent) 0%,#00aa7a 100%);border:none;border-radius:var(--rs);color:#000;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.02em;}
.run-btn:hover{opacity:.9;}
.run-btn:active{transform:scale(.98);}
.run-btn:disabled{opacity:.35;cursor:not-allowed;}

/* Loading overlay */
.loading-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:14px;overflow:hidden;}
.loading-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;width:0%;transition:width .4s ease;}
.loading-txt{font-size:12px;color:var(--text2);text-align:center;margin-bottom:10px;}

/* Results */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.res-title{font-size:13px;font-weight:600;color:var(--text);}
.res-car{font-size:11px;color:var(--accent);background:rgba(0,212,160,.1);border:1px solid rgba(0,212,160,.2);border-radius:20px;padding:3px 10px;}

/* Parts list */
.parts-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.part-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;transition:border-color .15s;}
.part-row:hover{border-color:var(--border2);}
.part-desc{font-size:13px;color:var(--text);flex:1;}
.part-code{font-family:'IBM Plex Mono',monospace;font-size:12px;background:rgba(0,212,160,.11);color:var(--accent);padding:4px 11px;border-radius:20px;border:1px solid rgba(0,212,160,.2);white-space:nowrap;margin-right:10px;}
.part-code.warn{background:rgba(245,158,11,.1);color:var(--warn);border-color:rgba(245,158,11,.2);}
.conf-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:6px;}
.cd-h{background:var(--success);}
.cd-m{background:var(--warn);}
.cd-l{background:var(--danger);}

/* not-found row */
.part-row.notfound{border-color:rgba(239,68,68,.2);}
.part-row.notfound .part-desc{color:var(--text2);}
.nf-badge{font-size:11px;color:var(--danger);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.18);border-radius:20px;padding:3px 9px;white-space:nowrap;margin-right:10px;font-family:'IBM Plex Mono',monospace;}

/* Copy buttons */
.copy-row{display:flex;gap:8px;flex-wrap:wrap;}
.copy-btn{padding:9px 16px;background:transparent;border:1px solid var(--border2);border-radius:var(--rs);color:var(--text2);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,160,.05);}
.copy-btn.ok{border-color:var(--accent);color:var(--accent);background:rgba(0,212,160,.07);}
.copy-btn .ico{font-size:13px;}

/* Empty / error */
.empty{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px;}
.empty-ic{font-size:28px;margin-bottom:8px;opacity:.3;}
.warn-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--warn);margin-bottom:12px;}

.fade{animation:fi .3s ease forwards;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--text3);}
</style>
</head>
<body>
<div class="app">

<header>

    <div class="step-lbl">النتيجة</div>
  </div>
</div>

<!-- STEP 1: Car Model -->
<div class="panel" id="panel1">
  <div class="ph">

  </div>
  <div class="pb">

        <div class="car-y">2019 – 2022</div>
        <div class="car-eng">2.5L Hybrid / Petrol</div>
      </button>
      <button class="car-btn" onclick="selectCar(this,'patrol_2018')">
        <div class="car-m">نيسان باترول</div>
        <div class="car-y">2016 – 2019</div>
        <div class="car-eng">5.6L V8 Petrol</div>
      </button>
      <button class="car-btn" onclick="selectCar(this,'accent_2021')">
        <div class="car-m">هيونداي اكسنت</div>
        <div class="car-y">2020 – 2023</div>
        <div class="car-eng">1.6L Petrol</div>
      </button>
      <button class="car-btn" onclick="selectCar(this,'civic_2020')">
        <div class="car-m">هوندا سيفيك</div>
        <div class="car-y">2019 – 2021</div>
        <div class="car-eng">1.5L Turbo</div>
      </button>
      <button class="car-btn" onclick="selectCar(this,'sportage_2022')">
        <div class="car-m">كيا سبورتاج</div>
        <div class="car-y">2022 – 2024</div>
        <div class="car-eng">2.0L Petrol</div>
      </button>
      <button class="car-btn" onclick="selectCar(this,'altima_2020')">
        <div class="car-m">نيسان التيما</div>
        <div class="car-y">2019 – 2022</div>
        <div class="car-eng">2.5L Petrol</div>
      </button>
    </div>
  </div>
</div>

<!-- STEP 2: Parts Input -->
<div class="panel" id="panel2" style="opacity:.45;pointer-events:none;">
  <div class="ph">
    <div class="pt"><div class="pico ic-b">2</div>اكتب القطع المطلوبة</div>
    <div style="font-size:11px;color:var(--text3)">كل قطعة في سطر أو مفصولة بفاصلة</div>
  </div>
  <div class="pb">
    <textarea id="partsInput" rows="5"
      placeholder="مثال:
فلتر زيت
تيل فرامل امامي
شمعات اشعال
فلتر هواء"></textarea>
    <button class="run-btn" id="runBtn" onclick="runLookup()">بحث عن أرقام القطع ←</button>
  </div>
</div>

<!-- STEP 3: Results -->
<div class="panel" id="panel3" style="opacity:.45;pointer-events:none;">
  <div class="ph">
    <div class="pt"><div class="pico ic-g">3</div>النتيجة</div>
    <div style="font-size:11px;color:var(--text3)" id="procTime"></div>
  </div>
  <div class="pb" id="outputArea">
    <div class="empty"><div class="empty-ic">◎</div>النتيجة ستظهر هنا</div>
  </div>
</div>

<footer>
  <span>Workshop Parts Lookup — SAP DBM Demo</span>
  <span id="clock"></span>
</footer>
</div>

// ─── FUZZY MATCH ─────────────────────────────────────────────────
// Normalize Arabic input then find best key match
function normalize(s) {
  return s
    .replace(/[\u064B-\u065F\u0670]/g, '')   // tashkeel
    .replace(/[أإآا]/g, 'ا')                  // hamza unify
    .replace(/ة/g, 'ه')                        // ta marbuta
    .replace(/ى/g, 'ي')                        // alef maqsura
    .replace(/\s+/g, ' ')
    .trim().toLowerCase();
}

function similarity(a, b) {
  a = normalize(a); b = normalize(b);
  if (a === b) return 1;
  if (b.includes(a) || a.includes(b)) return 0.9;
  // count common char bigrams
  const bigrams = s => { const m = new Set(); for (let i=0;i<s.length-1;i++) m.add(s[i]+s[i+1]); return m; };
  const ba = bigrams(a), bb = bigrams(b);
  let common = 0;
  ba.forEach(g => { if (bb.has(g)) common++; });
  return (2 * common) / (ba.size + bb.size + .01);
}

function lookupPart(carId, rawInput) {
  const car = DB[carId];
  if (!car) return null;
  const keys = Object.keys(car.parts);
  let best = null, bestScore = 0;
  for (const k of keys) {
    const s = similarity(rawInput, k);
    if (s > bestScore) { bestScore = s; best = k; }
  }
  if (bestScore < 0.35) return { notFound: true, input: rawInput };
  const p = car.parts[best];
  return { ...p, input: rawInput, matchKey: best, score: bestScore };
}

// ─── STATE ────────────────────────────────────────────────────────
let selectedCarId = null;

function selectCar(btn, id) {
  selectedCarId = id;
  document.querySelectorAll('.car-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  // unlock step 2
  document.getElementById('panel2').style.opacity = '1';
  document.getElementById('panel2').style.pointerEvents = 'auto';
  setStep(1);
  document.getElementById('partsInput').focus();
}

function setStep(n) {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('st' + i);
    el.className = 'step-item' + (i < n ? ' done' : i === n ? ' active' : '');
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runLookup() {
  const raw = document.getElementById('partsInput').value.trim();
  if (!raw) return;
  if (!selectedCarId) { alert('يرجى اختيار موديل السيارة أولاً'); return; }

  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.textContent = 'جارٍ البحث...';
  const start = Date.now();

  // Parse lines or comma-separated
  const inputs = raw.split(/[\n،,]+/).map(s => s.trim()).filter(Boolean);

  // Unlock result panel
  const p3 = document.getElementById('panel3');
  p3.style.opacity = '1'; p3.style.pointerEvents = 'auto';

  // Show minimal loading
  const output = document.getElementById('outputArea');
  output.innerHTML = `
    <div class="loading-txt" id="ltxt">جارٍ مطابقة ${inputs.length} قطعة مع قاعدة بيانات SAP...</div>
    <div class="loading-bar"><div class="loading-fill" id="lbar"></div></div>`;

  const bar = document.getElementById('lbar');
  const steps = [20, 55, 80, 100];
  const msgs = [
    'تطبيع النص العربي...',
    `مطابقة القطع مع موديل ${DB[selectedCarId].label}...`,
    'التحقق من أرقام SAP...',
    'جاهز'
  ];
  for (let i = 0; i < steps.length; i++) {
    bar.style.width = steps[i] + '%';
    document.getElementById('ltxt').textContent = msgs[i];
    await delay(320);
  }
  await delay(150);

  // Resolve all parts
  const results = inputs.map(inp => lookupPart(selectedCarId, inp));
  const found = results.filter(r => !r.notFound);
  const notFound = results.filter(r => r.notFound);

  const elapsed = ((Date.now() - start) / 1000).toFixed(1);
  document.getElementById('procTime').textContent = `⏱ ${elapsed} ث`;
  setStep(2);

  // Build output
  let html = `<div class="results-header fade">
    <div class="res-title">نتائج البحث — ${results.length} قطعة</div>
    <div class="res-car">${DB[selectedCarId].label}</div>
  </div>`;

  if (notFound.length > 0) {
    html += `<div class="warn-box fade">⚠ ${notFound.length} قطعة لم يتم التعرف عليها: ${notFound.map(r => r.input).join(' — ')}</div>`;
  }

  html += `<div class="parts-list" id="partsList">`;
  for (const r of results) {
    if (r.notFound) {
      html += `<div class="part-row notfound fade">
        <div class="part-desc">${r.input}</div>
        <span class="nf-badge">غير موجود</span>
      </div>`;
    } else {
      const cdClass = r.conf === 'h' ? 'cd-h' : r.conf === 'm' ? 'cd-m' : 'cd-l';
      html += `<div class="part-row fade">
        <div class="conf-dot ${cdClass}"></div>
        <div class="part-desc">${r.desc}</div>
        <span class="part-code">${r.code}</span>
      </div>`;
    }
  }
  html += `</div>`;

  // Copy buttons — only if found items exist
  if (found.length > 0) {
    html += `<div class="copy-row" style="margin-top:14px;">
      <button class="copy-btn" id="cpCodes" onclick="copyCodes()">
        <span class="ico">⎘</span> نسخ أرقام القطع فقط (عمود Excel)
      </button>
      <button class="copy-btn" id="cpAll" onclick="copyAll()">
        <span class="ico">⎘</span> نسخ الوصف + الرقم (كل قطعة في سطر)
      </button>
    </div>`;
  }

  output.innerHTML = html;
  btn.disabled = false; btn.textContent = 'بحث عن أرقام القطع ←';
}

// Copy only SAP codes — one per line → paste into one Excel column
function copyCodes() {
  const rows = document.querySelectorAll('#partsList .part-row:not(.notfound)');
  const codes = [...rows].map(r => r.querySelector('.part-code').textContent.trim());
  navigator.clipboard.writeText(codes.join('\n')).then(() => {
    const b = document.getElementById('cpCodes');
    b.classList.add('ok'); b.innerHTML = '<span class="ico">✓</span> تم النسخ — الصق في Excel';
    setTimeout(() => { b.classList.remove('ok'); b.innerHTML = '<span class="ico">⎘</span> نسخ أرقام القطع فقط (عمود Excel)'; }, 2500);
  });
}

// Copy description + code per line
function copyAll() {
  const rows = document.querySelectorAll('#partsList .part-row:not(.notfound)');
  const lines = [...rows].map(r => {
    const desc = r.querySelector('.part-desc').textContent.trim();
    const code = r.querySelector('.part-code').textContent.trim();
    return `${desc}\t${code}`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const b = document.getElementById('cpAll');
    b.classList.add('ok'); b.innerHTML = '<span class="ico">✓</span> تم النسخ — الصق في Excel';
    setTimeout(() => { b.classList.remove('ok'); b.innerHTML = '<span class="ico">⎘</span> نسخ الوصف + الرقم (كل قطعة في سطر)'; }, 2500);
  });
}
